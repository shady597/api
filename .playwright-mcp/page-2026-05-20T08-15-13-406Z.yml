            - img "Introducing Google Antigravity 2.0" [ref=e89]
            - generic [ref=e90]:
              - paragraph [ref=e93]:
                - text: Google Antigravity 2.0 is a new, standalone desktop application that fully delivers on a truly agent-optimized experience, available on macOS, Linux, and Windows (download
                - link "here" [ref=e94] [cursor=pointer]:
                  - /url: https://antigravity.google/download
                - text: ). Users interact with powerful agents both synchronously and asynchronously, and there is no IDE. While it retains many of the core principles of the Antigravity IDE’s Agent Manager surface, it is a completely separate desktop application. It is
                - link "available to enterprises" [ref=e95] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/google-antigravity-for-enterprises
                - text: ","
                - link "powered by the latest Gemini models" [ref=e96] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/gemini-3-5-flash-in-google-antigravity
                - text: ", and orchestrates agents"
                - link "capable of completing complex tasks" [ref=e97] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/google-antigravity-built-an-os
                - text: .
              - paragraph [ref=e100]:
                - text: Let us walk through the high level of the new features and capabilities. For more demos and deep dives, check out
                - link "this blog post" [ref=e101] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/google-io-2026-feature-deep-dive
                - text: .
              - paragraph [ref=e104]: "At the core is still an agent. You can synchronously have a conversation with an agent, view the artifacts it produces, and provide feedback directly on the artifacts to guide towards your desired outcomes:"
              - generic [ref=e106]:
                - img "Agent-first layout of Antigravity 2.0." [ref=e107]
                - paragraph [ref=e108]: Agent-first layout of Antigravity 2.0.
              - paragraph [ref=e111]: "These agents are more powerful than before. Some new capabilities include:"
              - list [ref=e114]:
                - listitem [ref=e115]: "Dynamic subagents: the main agent can dynamically choose to define and invoke subagents to complete focused subtasks, thereby not polluting the main agents’ context window and allowing for parallelism of work."
                - listitem [ref=e116]: "Asynchronous task management: Tasks and commands are managed and can run asynchronously to not block the main agent from continuing its work."
                - listitem [ref=e117]: "JSON hooks: You can now define hooks in a simple JSON format, allowing you to intercept and control the Antigravity agent’s behavior."
              - paragraph [ref=e120]: "A brand new way of interacting with agents in Antigravity 2.0 is through Scheduled Tasks, where you can define crons to trigger the invocation of Antigravity agents on a predefined schedule. No longer do you need to manually invoke every agent:"
              - generic [ref=e122]:
                - img "Set recurring schedules or one-off timers using the /schedule command or Scheduled Tasks." [ref=e123]
                - paragraph [ref=e124]: Set recurring schedules or one-off timers using the /schedule command or Scheduled Tasks.
              - paragraph [ref=e127]: We’ve also removed the tight coupling between agent and repository. Instead of agent conversations being grouped by “workspace” (i.e. repository), they are now grouped by “project,” which can correspond to multiple folders and enforce its own agent settings and permissions. This allows you to let agents access more information and tackle more complex tasks, while still providing the knobs to put appropriate, specific guardrails.
              - paragraph [ref=e130]: "There is a whole list of new fun slash commands:"
              - list [ref=e133]:
                - listitem [ref=e134]: "/goal: Run until the specified task is completely finished, not asking for intermediate input from the user."
                - listitem [ref=e135]: "/grill-me: Before starting to implement, ask questions back to align on the specific details of the plan."
                - listitem [ref=e136]: "/schedule: Run an instruction as a one-time timer in the future or on some recurring schedule (via Scheduled Tasks)"
                - listitem [ref=e137]: "/browser: We heard the feedback that the agents were still not capable enough to determine exactly when to be using the browser. So for now, we’ve made it such that an explicit slash command controls these behaviors. When used, the agent diligently uses the browser primitives, and when not, it will ignore."
              - paragraph [ref=e140]: "One favorite new feature is that the voice input (mic icon next to text input boxes) now does live transcription of your words, as opposed to collecting the raw audio file to pass into the model:"
              - generic [ref=e142]:
                - generic [ref=e143] [cursor=pointer]:
                  - img "Google Antigravity Blinking Cursor" [ref=e144]
                  - generic [ref=e145]: play_arrow
                - paragraph [ref=e146]: Live voice transcription.
              - paragraph [ref=e149]: "And of course, there is a long list of UI polish and performance improvements to make Antigravity 2.0 the most powerful and intuitive way to work with agents: sidebar organization, standalone conversations, a sleek review flow for changes, new UI elements for all of the new agent capabilities, and much more."
              - paragraph [ref=e152]:
                - text: Again, check out
                - link "this deep-dive" [ref=e153] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/google-io-2026-feature-deep-dive
                - text: into a number of the new features in Antigravity 2.0.
              - heading "Why a 2.0?" [level=3] [ref=e156]
              - paragraph [ref=e159]: When we launched the Google Antigravity IDE in November 2025, there was no agent-first GUI surface in the market. We wanted to prove that such a surface worked, at least for software development. So, while the core of the Antigravity IDE was a familiar agent-powered IDE, we introduced the Agent Manager, a second surface that stripped away much of the “IDE” UI. This allowed users to focus on the agent conversations themselves, the artifacts the agents produced, and multi-agent management. Since that launch, millions of developers have adopted the Antigravity IDE, and this agent-first paradigm has become standard across the industry.
              - paragraph [ref=e162]: "However, we knew the entire time that:"
              - list [ref=e165]:
                - listitem [ref=e166]:
                  - text: At some point, coding would expand to knowledge work, both because the models would become better and because naturally there is a ceiling to the overall value we can provide users by accelerating
                  - emphasis [ref=e167]: just
                  - text: coding.
                - listitem [ref=e168]: In such a world, tying together an IDE and agent-first surface in a single application would be confusing and potentially daunting to those less familiar with code and IDEs. Even without this separation, we have been pleasantly surprised how many people have adopted the Agent Manager in the Antigravity IDE for such non-development tasks, but it is not particularly intuitive.
                - listitem [ref=e169]: The product, agent harness, and model layers all had to be co-optimized and co-developed, and while agentic coding is a necessary step towards general model intelligence, it is not sufficient.
              - paragraph [ref=e172]: "We’ve been busy in the last few months so that we could:"
              - list [ref=e175]:
                - listitem [ref=e176]: Integrate the Antigravity product agent harness with the Gemini training and evaluation stacks
                - listitem [ref=e177]: Rearchitect the product to be agent-first from the ground up, independent of an IDE or other dev-specific concepts such as repositories
                - listitem [ref=e178]:
                  - text: Round out the Antigravity platform with more surfaces and tooling to be a complete offering (see the launches for the
                  - link "Antigravity CLI" [ref=e179] [cursor=pointer]:
                    - /url: https://antigravity.google/blog/introducing-google-antigravity-cli
                  - text: ", the"
                  - link "Antigravity SDK" [ref=e180] [cursor=pointer]:
                    - /url: https://antigravity.google/blog/introducing-google-antigravity-sdk
                  - text: ", and more)."
              - heading "Getting Started with Antigravity 2.0" [level=3] [ref=e183]
              - paragraph [ref=e186]:
                - text: If you are brand new to Google Antigravity, visit our
                - link "download page" [ref=e187] [cursor=pointer]:
                  - /url: https://antigravity.google/download
                - text: .
              - paragraph [ref=e190]: "If you already have installed the Antigravity IDE, when that application next updates, it will automatically update to Antigravity 2.0. At this point, you will be asked if you would like to still keep the Antigravity IDE, which is recommended for developers:"
              - generic [ref=e192]:
                - generic [ref=e193] [cursor=pointer]:
                  - img "Google Antigravity Blinking Cursor" [ref=e194]
                  - generic [ref=e195]: play_arrow
                - paragraph [ref=e196]: Update screen from the Antigravity IDE to Antigravity 2.0.
              - paragraph [ref=e199]: "These two applications will be differentiated on your machine’s dock via icon background. Antigravity 2.0 has the logo on a white background while Antigravity IDE has the logo on top of a black grid:"
              - generic [ref=e201]:
                - img "Antigravity IDE and Antigravity 2.0 logos, respectively." [ref=e202]
                - paragraph [ref=e203]: Antigravity IDE and Antigravity 2.0 logos, respectively.
              - heading "The Antigravity IDE" [level=3] [ref=e206]
              - paragraph [ref=e209]:
                - text: Although Antigravity 2.0 is the future, we won’t disrupt your workflows right away. For now, both the Antigravity IDE application itself
                - emphasis [ref=e210]: and
                - text: the Agent Manager in the Antigravity IDE will remain available. In an upcoming release, we will remove the Agent Manager from the Antigravity IDE, turning the IDE into a purely agent-powered IDE.
              - paragraph [ref=e213]: We recommend dual-wielding Antigravity 2.0 with your IDE of choice, whether it is the Antigravity IDE or otherwise. Googlers have already been dual wielding Antigravity 2.0 with a whole host of IDEs! We will have compatible extensions and plugins into other popular IDEs shortly.
              - heading "Looking Forward" [level=3] [ref=e216]
              - paragraph [ref=e219]:
                - text: Alongside Antigravity 2.0, we have introduced a
                - link "CLI" [ref=e220] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/introducing-google-antigravity-cli
                - text: ","
                - link "SDK" [ref=e221] [cursor=pointer]:
                  - /url: https://antigravity.google/blog/introducing-google-antigravity-sdk
                - text: ","
                - link "API" [ref=e222] [cursor=pointer]:
                  - /url: https://blog.google/innovation-and-ai/technology/developers-tools/managed-agents-gemini-api
                - text: ", and more. We have built integrations with other Google products and tech stacks. And we have the momentum of the model and agent harness being co-optimized."
              - paragraph [ref=e225]: This is just the beginning. We look forward to launching remote control, more product integrations, cloud-deployed agents, and much more.
              - link "Download Antigravity 2.0" [ref=e228] [cursor=pointer]:
                - /url: /download
